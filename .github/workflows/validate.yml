name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-json:
    name: Validate JSON & Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate workbook JSON
        run: |
          python3 -c "import json; json.load(open('workbook/ai-readiness-assessment.workbook')); print('workbook JSON: valid')"

      - name: Validate ARM template JSON
        run: |
          python3 -c "import json; json.load(open('workbook/azuredeploy.json')); print('ARM template JSON: valid')"

      - name: Check serializedData round-trip
        run: |
          python3 -c "
          import json
          arm = json.load(open('workbook/azuredeploy.json'))
          serialized = arm['resources'][0]['properties']['serializedData']
          wb = json.loads(serialized)
          assert 'items' in wb, 'workbook missing items key'
          print(f'Embedded workbook: valid ({len(wb[\"items\"])} items)')
          "

      - name: Check required test IDs present
        run: |
          python3 << 'EOF'
          import json
          wb = json.load(open('workbook/ai-readiness-assessment.workbook'))
          content = json.dumps(wb)
          required = [
              'DMG-001','DMG-002','DMG-003','DMG-004','DMG-005','DMG-006','DMG-007','DMG-008',
              'RCE-001','RCE-002','RCE-003','RCE-004','RCE-005',
              'MDL-001','MDL-002','MDL-003','MDL-004','MDL-005','MDL-006','MDL-007','MDL-008',
              'RAI-001','RAI-002','RAI-003','RAI-004',
              'SEC-001','SEC-002','SEC-003','SEC-004','SEC-005','SEC-006','SEC-007',
              'MON-001','MON-002','MON-003','MON-004','MON-005'
          ]
          missing = [tid for tid in required if tid not in content]
          if missing:
              print(f'FAIL: Missing test IDs: {missing}')
              exit(1)
          print(f'All {len(required)} test IDs present')
          EOF

      - name: Verify ARM template and workbook are in sync
        run: |
          python3 << 'EOF'
          import json
          wb_standalone = json.load(open('workbook/ai-readiness-assessment.workbook'))
          arm = json.load(open('workbook/azuredeploy.json'))
          wb_embedded = json.loads(arm['resources'][0]['properties']['serializedData'])
          assert json.dumps(wb_standalone, sort_keys=True) == json.dumps(wb_embedded, sort_keys=True), \
              'ARM template serializedData does not match workbook file. Run: scripts/build-arm-template.ps1'
          print('ARM template and workbook are in sync')
          EOF

  lint-scripts:
    name: Lint PowerShell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $results = Invoke-ScriptAnalyzer -Path ./scripts -Recurse -Severity Warning,Error `
            -ExcludeRule PSAvoidUsingWriteHost,PSUseBOMForUnicodeEncodedFile,PSUseSingularNouns
          if ($results) {
            $results | Format-Table -AutoSize
            exit 1
          }
          Write-Host 'All scripts pass PSScriptAnalyzer'

